<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We've Moved</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#0d1117;
    color:#fff;
}

.container{
    text-align:center;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:16px;
    padding:50px;
    max-width:600px;
    width:90%;
}

h1{
    font-size:42px;
    margin-bottom:20px;
}

p{
    font-size:20px;
    color:#b1bac4;
    line-height:1.6;
}

a{
    color:#58a6ff;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    background:#238636;
    color:white;
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
}

.button:hover{
    background:#2ea043;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
    <h1>We've Moved!</h1>

    <p>
        We have moved domains to
        <a href="https://localmate.co.uk">localmate.co.uk</a>.
    </p>

    <a class="button" href="https://localmate.co.uk">
        Visit LocalMate
    </a>
</div>

</body>
</html>
